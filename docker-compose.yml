version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - API_KEY=grocery_super_secret_token_123
      - DB_DIR=/app/data
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_KEY=grocery_super_secret_token_123
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite-data:
